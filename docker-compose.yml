services:
  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: restobot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restobot_db}
      POSTGRES_USER: ${POSTGRES_USER:-restobot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-restobot_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - restobot_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-restobot_user}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Telegram Bot Application
  restobot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restobot_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-restobot_db}
      POSTGRES_USER: ${POSTGRES_USER:-restobot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-restobot_pass}
      BOT_TOKEN: ${BOT_TOKEN}
      SPREADSHEET_KEY: ${SPREADSHEET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MENU_PATH: /app/rest_menu
      LOGS_PATH: /app/logs
      CACHE_PATH: /app/cache
      CREDENTIALS_PATH: /app/client_secret.json
    volumes:
      - ./rest_menu:/app/rest_menu
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./pending_menu:/app/pending_menu
      - ./client_secret.json:/app/client_secret.json:ro
    networks:
      - restobot_network

volumes:
  postgres_data:

networks:
  restobot_network:
    driver: bridge
